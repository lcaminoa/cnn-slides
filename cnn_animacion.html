<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cómo funciona una CNN — apoyo visual</title>
<style>
  :root{
    --bg:#ffffff; --fg:#000000; --muted:#6e6e73; --line:#d2d2d7;
    --surface:#f5f5f7; --blue:#1c7ed6; --orange:#ff9500;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    --cell:56px; --gap:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--fg);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;flex-direction:column;overflow:hidden;user-select:none;
  }

  /* ── Barra de texto superior ── */
  header{padding:34px 8vw 10px;text-align:center;flex:none;}
  .chip{
    display:inline-block;font-size:13px;font-weight:600;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted);border:1px solid var(--line);
    border-radius:980px;padding:5px 16px;margin-bottom:16px;
  }
  h1.caption{font-size:34px;font-weight:700;letter-spacing:-.03em;line-height:1.08;}
  p.explain{
    margin:12px auto 0;max-width:900px;font-size:20px;line-height:1.4;
    color:var(--muted);font-weight:400;letter-spacing:-.01em;
  }
  p.explain b{color:var(--fg);font-weight:600;}

  /* ── Escenario ── */
  main{flex:1;display:flex;align-items:center;justify-content:center;
       padding:10px 6vw 0;min-height:0;overflow:hidden;}
  /* Ancho de diseño fijo (como en la compu): el layout es idéntico en toda
     pantalla; luego fitStage() lo escala parejo para que entre. flex:none evita
     que el contenedor lo encoja y reacomode. */
  .stage{display:flex;align-items:center;justify-content:center;gap:56px;flex-wrap:wrap;
         width:1300px;flex:none;}

  /* Grillas */
  .gridwrap{position:relative;}
  .grid{display:grid;gap:var(--gap);}
  .lbl{font-size:15px;color:var(--muted);text-align:center;margin-bottom:12px;
       font-weight:600;letter-spacing:.02em;}
  .cell{
    width:var(--cell);height:var(--cell);border-radius:9px;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:19px;font-weight:600;font-variant-numeric:tabular-nums;
    background:#fff;transition:transform .3s ease, opacity .3s ease, background .3s ease;
  }
  .cell.dim{opacity:.32;}
  .cell.win{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue) inset;}
  .cell.hidden{opacity:0;transform:scale(.6);}
  .cell.pop{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}

  /* Overlay del filtro que se desliza */
  .koverlay{
    position:absolute;top:0;left:0;pointer-events:none;
    border:3px solid var(--blue);border-radius:12px;
    box-shadow:0 8px 24px rgba(28,126,214,.28);
    transition:transform .45s cubic-bezier(.4,0,.2,1);
  }

  .arrow{font-size:40px;color:var(--muted);font-weight:300;}
  .opsign{font-size:34px;color:var(--muted);font-weight:300;padding:0 4px;}

  /* Panel de cálculo */
  .calc{min-width:210px;max-width:250px;background:var(--surface);border-radius:16px;
        padding:20px 22px;font-size:17px;line-height:1.5;color:var(--muted);}
  .calc .big{font-size:30px;font-weight:700;color:var(--fg);letter-spacing:-.02em;
             margin-top:6px;font-variant-numeric:tabular-nums;}
  .calc .blue{color:var(--blue);}

  /* Bloques de pipeline */
  .pipe{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;}
  .block{border-radius:14px;background:var(--surface);border:1px solid var(--line);
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         padding:16px;opacity:0;transform:translateY(14px);
         transition:opacity .45s ease, transform .45s ease;}
  .block.show{opacity:1;transform:none;}
  .block .bt{font-size:16px;font-weight:700;letter-spacing:-.01em;}
  .block .bs{font-size:13px;color:var(--muted);margin-top:3px;}
  .conv-b{background:#eaf3fe;border-color:#bcdcfb;}
  .verdict{font-size:26px;font-weight:700;letter-spacing:-.02em;}
  .probbar{width:200px;height:16px;border-radius:980px;background:var(--line);
           overflow:hidden;margin-top:10px;}
  .probfill{height:100%;width:0;background:var(--blue);transition:width .8s ease;border-radius:980px;}

  /* Título / cierre */
  .hero{text-align:center;max-width:1000px;}
  .hero h2{font-size:52px;font-weight:700;letter-spacing:-.04em;line-height:1.05;}
  .hero p{margin-top:20px;font-size:22px;color:var(--muted);line-height:1.45;}

  /* Filas de mini-mapas (varios filtros) */
  .maps{display:flex;gap:44px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .mapcol{opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s;}
  .mapcol.show{opacity:1;transform:none;}

  /* Jerarquía */
  .tiers{display:flex;align-items:center;gap:26px;flex-wrap:wrap;justify-content:center;}
  .tier{width:150px;height:150px;border-radius:16px;background:var(--surface);
        border:1px solid var(--line);display:flex;flex-direction:column;
        align-items:center;justify-content:flex-start;padding:12px 10px 10px;
        overflow:hidden;opacity:0;transform:translateY(12px);
        transition:opacity .45s,transform .45s;}
  .tier.show{opacity:1;transform:none;}
  .tier .tname{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .tier svg{width:100%;flex:1;min-height:0;}

  /* ── Controles ── */
  footer{flex:none;display:flex;align-items:center;justify-content:center;gap:22px;
         padding:16px 0 26px;}
  .nav{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);
       background:#fff;color:var(--fg);font-size:22px;cursor:pointer;
       display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .nav:hover{background:var(--surface);}
  .nav:disabled{opacity:.3;cursor:default;}
  .counter{font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:52px;text-align:center;}
  .hint{position:fixed;bottom:8px;right:14px;font-size:12px;color:var(--muted);opacity:.7;}
  .progress{position:fixed;top:0;left:0;height:3px;background:var(--blue);
            transition:width .3s ease;z-index:10;}

  /* La escena se auto-escala por JS; el origen centrado la mantiene visible */
  .stage{transform-origin:center center;}

  /* Pantallas chicas (iPad, tablets): menos padding y títulos algo más chicos */
  @media (max-width:1100px){
    header{padding:18px 4vw 6px;}
    h1.caption{font-size:26px;}
    p.explain{font-size:17px;margin-top:8px;}
    main{padding:6px 2vw 0;}
    footer{padding:10px 0 16px;}
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <header>
    <div class="chip" id="chip">Redes convolucionales</div>
    <h1 class="caption" id="capTitle"></h1>
    <p class="explain" id="capBody"></p>
  </header>
  <main><div class="stage" id="stage"></div></main>
  <footer>
    <button class="nav" id="prev" aria-label="Anterior">&#8592;</button>
    <div class="counter" id="counter"></div>
    <button class="nav" id="next" aria-label="Siguiente">&#8594;</button>
  </footer>
  <div class="hint">← → o barra espaciadora · <b>F</b> pantalla completa</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Datos: una "imagen" 5×5 con un borde vertical + filtro detector de bordes
// ─────────────────────────────────────────────────────────────
const INPUT = [
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
];
const KERNEL = [[-1,0,1],[-1,0,1],[-1,0,1]]; // detector de borde vertical
const N = 5, K = 3, OUT = N - K + 1;          // salida 3×3

function convVal(r,c){
  let s=0;
  for(let i=0;i<K;i++) for(let j=0;j<K;j++) s += KERNEL[i][j]*INPUT[r+i][c+j];
  return s;
}
const OUTVALS=[]; let OUTMAX=0;
for(let r=0;r<OUT;r++){OUTVALS[r]=[];for(let c=0;c<OUT;c++){const v=convVal(r,c);OUTVALS[r][c]=v;OUTMAX=Math.max(OUTMAX,Math.abs(v));}}

// ─────────────────────────────────────────────────────────────
//  Definición de los pasos
// ─────────────────────────────────────────────────────────────
const steps=[];
steps.push({kind:'title'});
steps.push({kind:'pixels'});
steps.push({kind:'mlp'});
steps.push({kind:'kernel'});
for(let k=0;k<OUT*OUT;k++) steps.push({kind:'conv',k});
steps.push({kind:'convdone'});
steps.push({kind:'filters'});
steps.push({kind:'pool'});
steps.push({kind:'hierarchy'});
steps.push({kind:'pipeline'});
steps.push({kind:'resnet'});
steps.push({kind:'fe'});
steps.push({kind:'ft'});
steps.push({kind:'example'});
steps.push({kind:'incremental'});

// Texto (chip / título / explicación) por tipo de paso
function captionFor(step){
  switch(step.kind){
    case 'title': return ['Redes convolucionales','¿Cómo entiende una CNN una imagen?','Paso a paso, el mecanismo que usa nuestro mejor modelo para decidir si una foto es <b>real</b> o <b>generada por IA</b>.'];
    case 'pixels': return ['1 · La imagen','Para la red, una imagen es una grilla de números','Cada píxel es un valor de intensidad. En este ejemplo 5×5, <b>claro a la izquierda, oscuro a la derecha</b>: hay un borde vertical en el medio.'];
    case 'mlp': return ['2 · El punto de partida','Un MLP aplana la imagen y pierde la estructura espacial','El MLP estira la imagen en un vector y trata cada píxel por separado: <b>los vecinos dejan de ser vecinos</b>. Es nuestro baseline (MLP + PCA); su límite motiva la CNN.'];
    case 'kernel': return ['3 · El filtro','Un filtro es una ventana de pesos que busca un patrón','Este filtro 3×3 es un <b>detector de bordes verticales</b>: resta la izquierda de la derecha. Se desliza por toda la imagen.'];
    case 'conv':{
      const r=Math.floor(step.k/OUT), c=step.k%OUT;
      if(step.k===0) return ['4 · La convolución','El filtro se apoya sobre una región y calcula un número','Multiplica cada peso por el píxel de abajo y <b>suma todo</b>. El resultado va a la primera celda del mapa.'];
      if(step.k===OUT*OUT-1) return ['4 · La convolución','…y así hasta cubrir toda la imagen','Barrió todas las posiciones con <b>los mismos pesos</b> (pesos compartidos) y armó el mapa completo.'];
      return ['4 · La convolución','Se desliza a la siguiente posición y repite','Cada posición da una celda del <b>mapa de activación</b> (fila '+(r+1)+', col '+(c+1)+').'];
    }
    case 'convdone': return ['5 · El mapa de activación','El resultado dice DÓNDE aparece el patrón','La columna central es la más intensa: ahí está el borde. Valores altos = <b>acá hay un borde vertical</b>.'];
    case 'filters': return ['6 · Muchos filtros a la vez','Cada filtro detecta algo distinto','Una capa tiene decenas de filtros: bordes, texturas, colores. Cada uno da su propio mapa, y <b>la red aprende sola cuáles le convienen</b>.'];
    case 'pool': return ['7 · ReLU + pooling','Se limpia y se achica el mapa','<b>ReLU</b> descarta lo negativo (deja solo lo positivo), y el <b>max pooling</b> resume cada ventana 2×2 en su máximo: el mapa se achica a la mitad.'];
    case 'hierarchy': return ['8 · Apilar capas','De bordes simples a estructuras complejas','Apilando bloques, la red arma una <b>jerarquía</b>: las primeras capas ven bordes y texturas; las profundas, formas y objetos.'];
    case 'pipeline': return ['9 · El pipeline completo','Así fluye una imagen por nuestra CNN','Cuatro bloques (conv + ReLU + pooling) achican el espacio y suman profundidad. Gracias a los <b>pesos compartidos</b> y a mirar de a vecindades, le gana al MLP. Al final, una capa densa: <b>real o IA</b>.'];
    case 'resnet': return ['10 · ResNet50','Una CNN muy profunda, ya entrenada','Partimos de <b>ResNet50</b>: 50 capas preentrenadas en ImageNet (1,2M imágenes), que ya sabe ver bordes, texturas y formas. Sus <b>conexiones residuales</b> (x + F(x)) permiten tanta profundidad sin que el gradiente se desvanezca.'];
    case 'fe': return ['11 · Feature Extraction','Congelamos todo y entrenamos solo la salida','Congelamos <b>toda</b> ResNet50 y entrenamos solo la capa final: <b>2.049 parámetros</b>. Rápido, y ya da 88 %.'];
    case 'ft': return ['12 · Fine-Tuning','Descongelamos el último bloque para especializarlo','Descongelamos también <b>layer4</b> (~15M parámetros) para adaptar los features de alto nivel a los artefactos de la IA. <b>Nuestro mejor modelo: 93,4 %.</b>'];
    case 'example': return ['El problema','La misma red con una foto real','La selfie atraviesa la CNN y se vuelve abstracta… pero la <b>marca como IA</b> (p = 0,56) siendo una <b>foto real</b>: fuera del dominio con el que se entrenó, falla. Eso es el <b>domain shift</b>.'];
    case 'incremental': return ['La solución · domain adaptation','El 5.º modelo: fine-tuning incremental','Seguimos entrenando el FT sobre fotos de <b>redes sociales</b>, con un learning rate chico. Recupera el rendimiento en ese dominio nuevo: <b>62,5 % → 94,5 %</b>, perdiendo solo 7 puntos en el original.'];
  }
}

// ─────────────────────────────────────────────────────────────
//  Helpers de render
// ─────────────────────────────────────────────────────────────
const stage=document.getElementById('stage');
const CELL=56, GAP=6, STRIDE=CELL+GAP;

function grayBg(v){const t=v/9;const g=Math.round(255-t*205);return `rgb(${g},${g},${g})`;}
function grayFg(v){return v/9>0.6?'#fff':'#111';}
function blueBg(v){const a=Math.abs(v)/OUTMAX*0.9;return `rgba(28,126,214,${a})`;}
function blueFg(v){return Math.abs(v)/OUTMAX>0.5?'#fff':'#111';}

function makeGrid(vals,{cls='',color='gray'}={}){
  const wrap=document.createElement('div');wrap.className='gridwrap';
  const g=document.createElement('div');g.className='grid '+cls;
  const cols=vals[0].length;
  g.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  vals.forEach((row,r)=>row.forEach((v,c)=>{
    const cell=document.createElement('div');cell.className='cell';
    cell.dataset.r=r;cell.dataset.c=c;cell.textContent=v;
    if(color==='gray'){cell.style.background=grayBg(v);cell.style.color=grayFg(v);}
    else if(color==='kernel'){
      if(v>0){cell.style.background='#eaf3fe';cell.style.borderColor='#bcdcfb';cell.style.color='var(--blue)';}
      else if(v<0){cell.style.background='#fdeee0';cell.style.borderColor='#f6d3ac';cell.style.color='#c76b00';}
      cell.textContent=(v>0?'+':'')+v;
    }
    g.appendChild(cell);
  }));
  wrap.appendChild(g);
  return wrap;
}
function labeled(node,text){
  const box=document.createElement('div');
  const l=document.createElement('div');l.className='lbl';l.innerHTML=text;
  box.appendChild(l);box.appendChild(node);return box;
}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function arrow(){return el('div','arrow','→');}

// ── Convolución (scaffold persistente) ──
let conv={built:false,inputWrap:null,outWrap:null,overlay:null,calc:null};
function buildConv(){
  stage.innerHTML='';
  const inWrap=makeGrid(INPUT,{color:'gray'});
  const overlay=el('div','koverlay');
  overlay.style.width=(K*CELL+(K-1)*GAP)+'px';
  overlay.style.height=(K*CELL+(K-1)*GAP)+'px';
  inWrap.appendChild(overlay);

  const empty=OUTVALS.map(row=>row.map(_=>''));
  const outWrap=makeGrid(empty,{color:'blue'});
  outWrap.querySelectorAll('.cell').forEach(c=>{c.classList.add('hidden');c.style.background='#fff';});

  const calc=el('div','calc');

  stage.appendChild(labeled(inWrap,'Imagen (5×5)'));
  const mid=el('div');mid.style.display='flex';mid.style.flexDirection='column';mid.style.alignItems='center';mid.style.gap='10px';
  mid.appendChild(labeled(makeGrid(KERNEL,{color:'kernel'}),'Filtro'));
  stage.appendChild(mid);
  stage.appendChild(arrow());
  stage.appendChild(labeled(outWrap,'Mapa de activación (3×3)'));
  stage.appendChild(calc);

  conv={built:true,inputCells:inWrap.querySelectorAll('.cell'),outCells:outWrap.querySelectorAll('.cell'),overlay,calc};
}
function updateConv(k){
  const r=Math.floor(k/OUT), c=k%OUT;
  conv.overlay.style.transform=`translate(${c*STRIDE}px,${r*STRIDE}px)`;
  // resaltar ventana de entrada
  conv.inputCells.forEach(cell=>{
    const cr=+cell.dataset.r, cc=+cell.dataset.c;
    const inWin=(cr>=r&&cr<r+K&&cc>=c&&cc<c+K);
    cell.classList.toggle('win',inWin);
    cell.classList.toggle('dim',!inWin);
  });
  // revelar celdas de salida hasta k
  conv.outCells.forEach((cell,idx)=>{
    const cr=Math.floor(idx/OUT), cc=idx%OUT, v=OUTVALS[cr][cc];
    if(idx<=k){
      if(cell.classList.contains('hidden')){cell.classList.remove('hidden');cell.classList.add('pop');}
      cell.textContent=v;cell.style.background=blueBg(v);cell.style.color=blueFg(v);
    }else{
      cell.classList.add('hidden');cell.textContent='';cell.style.background='#fff';
    }
  });
  // panel de cálculo
  let terms=[];
  for(let i=0;i<K;i++)for(let j=0;j<K;j++){const w=KERNEL[i][j];if(w!==0)terms.push(`(${w>0?'+':''}${w})·${INPUT[r+i][c+j]}`);}
  conv.calc.innerHTML=`posición fila ${r+1}, col ${c+1}<br>Σ pesos × píxeles:<br><span style="font-size:15px">${terms.join(' ')}</span><div class="big blue">= ${OUTVALS[r][c]}</div>`;
}

// ── Otros escenarios ──
function renderPixels(){
  stage.innerHTML='';
  stage.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen 5×5 · cada celda = un píxel'));
}
function renderKernel(){
  stage.innerHTML='';
  stage.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen'));
  const mid=el('div');mid.style.display='flex';mid.style.alignItems='center';mid.style.gap='16px';
  mid.appendChild(el('div','opsign','✳'));
  mid.appendChild(labeled(makeGrid(KERNEL,{color:'kernel'}),'Filtro 3×3 (detector de borde)'));
  stage.appendChild(mid);
}
function renderConvDone(){
  buildConv();updateConv(OUT*OUT-1);
  conv.overlay.style.opacity='0';
  conv.inputCells.forEach(c=>{c.classList.remove('win','dim');});
  conv.calc.innerHTML='Mapa completo.<br>Los valores altos marcan<br>el <b style="color:var(--blue)">borde vertical</b>.';
}
function renderFilters(){
  stage.innerHTML='';
  const maps=el('div','maps');
  const defs=[
    {name:'Borde vertical',k:[[-1,0,1],[-1,0,1],[-1,0,1]]},
    {name:'Borde horizontal',k:[[-1,-1,-1],[0,0,0],[1,1,1]]},
    {name:'Suavizado',k:[[1,1,1],[1,1,1],[1,1,1]]},
  ];
  // entrada a la izquierda
  const inCol=el('div','mapcol show');
  inCol.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen'));
  maps.appendChild(inCol);
  maps.appendChild(el('div','arrow','→'));
  defs.forEach((d,i)=>{
    const vals=[],mx={m:0};
    for(let r=0;r<OUT;r++){vals[r]=[];for(let c=0;c<OUT;c++){let s=0;for(let a=0;a<K;a++)for(let b=0;b<K;b++)s+=d.k[a][b]*INPUT[r+a][c+b];vals[r][c]=s;mx.m=Math.max(mx.m,Math.abs(s));}}
    const g=makeGrid(vals.map(row=>row.map(v=>v)),{color:'blue'});
    g.querySelectorAll('.cell').forEach((cell,idx)=>{const v=vals[Math.floor(idx/OUT)][idx%OUT];const a=(mx.m?Math.abs(v)/mx.m:0)*0.9;cell.style.background=`rgba(28,126,214,${a})`;cell.style.color=a>0.5?'#fff':'#111';});
    const col=el('div','mapcol');col.appendChild(labeled(g,d.name));
    col.style.transitionDelay=(i*0.18)+'s';
    maps.appendChild(col);
  });
  stage.appendChild(maps);
  requestAnimationFrame(()=>maps.querySelectorAll('.mapcol').forEach(m=>m.classList.add('show')));
}
function renderRelu(){
  stage.innerHTML='';
  const before=[[-4,3,-1],[2,-5,6],[-2,1,-3]];
  const after=before.map(r=>r.map(v=>Math.max(0,v)));
  stage.appendChild(labeled(makeGrid(before,{color:'blue'}),'Antes de ReLU'));
  const mid=el('div');mid.style.textAlign='center';
  mid.appendChild(el('div','arrow','→'));
  mid.appendChild(el('div','lbl','max(0, x)'));
  stage.appendChild(mid);
  stage.appendChild(labeled(makeGrid(after,{color:'blue'}),'Después de ReLU'));
  stage.querySelectorAll('.cell').forEach(c=>{const v=+c.textContent;const a=Math.abs(v)/6*0.9;c.style.background=v<0?'rgba(199,107,0,.28)':`rgba(28,126,214,${a})`;c.style.color=Math.abs(v)/6>0.5&&v>0?'#fff':'#111';});
}
function renderPool(){
  stage.innerHTML='';
  const src=[[1,3,2,4],[5,6,1,2],[7,1,3,8],[2,4,5,6]];
  const inWrap=makeGrid(src,{color:'blue'});
  inWrap.querySelectorAll('.cell').forEach(c=>{const v=+c.textContent;c.style.background=`rgba(28,126,214,${v/8*0.85})`;c.style.color=v/8>0.5?'#fff':'#111';});
  const out=[[Math.max(1,3,5,6),Math.max(2,4,1,2)],[Math.max(7,1,2,4),Math.max(3,8,5,6)]];
  const outWrap=makeGrid(out,{color:'blue'});
  outWrap.querySelectorAll('.cell').forEach((c,idx)=>{c.classList.add('hidden');const v=out[Math.floor(idx/2)][idx%2];c.style.background=`rgba(28,126,214,${v/8*0.85})`;c.style.color=v/8>0.5?'#fff':'#111';});
  stage.appendChild(labeled(inWrap,'Mapa 4×4'));

function resStack(mode){
  stage.innerHTML='';
  const pipe=el('div','pipe');
  const inb=el('div','block');inb.style.padding='0';inb.style.background='none';inb.style.border='none';
  const mini=makeGrid(INPUT,{color:'gray'});
  mini.querySelector('.grid').style.gridTemplateColumns='repeat(5,16px)';mini.querySelector('.grid').style.gap='2px';
  mini.querySelectorAll('.cell').forEach(c=>{c.style.width='16px';c.style.height='16px';c.style.fontSize='0';});
  inb.appendChild(labeled(mini,'Imagen'));
  pipe.appendChild(inb);
  const stages=['conv1','layer1','layer2','layer3','layer4'];
  stages.forEach((name,i)=>{
    pipe.appendChild(arrow());
    const last=(i===stages.length-1);
    let bg,bd,fg,tag;
    if(mode==='fe'){bg='#eeeef0';bd='#d2d2d7';fg='var(--muted)';tag='🔒 congelada';}
    else if(mode==='ft'){ if(last){bg='#eaf3fe';bd='var(--blue)';fg='var(--fg)';tag='entrenable';} else {bg='#eeeef0';bd='#d2d2d7';fg='var(--muted)';tag='🔒 congelada';} }
    else {bg='#eaf3fe';bd='#bcdcfb';fg='var(--fg)';tag='preentrenada';}
    const b=el('div','block');b.style.minWidth='92px';b.style.minHeight='68px';
    b.style.background=bg;b.style.borderColor=bd;
    if(mode==='ft'&&last) b.style.boxShadow='0 0 18px rgba(28,126,214,.28)';
    b.innerHTML='<div class="bt" style="color:'+fg+'">'+name+'</div><div class="bs">'+tag+'</div>';
    pipe.appendChild(b);
  });
  pipe.appendChild(arrow());
  const fc=el('div','block');fc.style.minWidth='96px';fc.style.minHeight='68px';
  if(mode==='fe'||mode==='ft'){fc.style.background='#eaf3fe';fc.style.borderColor='var(--blue)';fc.style.boxShadow='0 0 18px rgba(28,126,214,.28)';fc.innerHTML='<div class="bt">fc → 1</div><div class="bs">entrenable</div>';}
  else{fc.style.background='#eaf3fe';fc.style.borderColor='#bcdcfb';fc.innerHTML='<div class="bt">fc → 1</div><div class="bs">salida</div>';}
  pipe.appendChild(fc);
  const note=el('div');note.style.cssText='width:100%;text-align:center;margin-top:26px;font-size:16px;color:var(--muted);';
  if(mode==='resnet') note.innerHTML='50 capas · preentrenada en ImageNet · cada bloque: salida = <b style="color:var(--fg)">x + F(x)</b> (conexión residual)';
  else if(mode==='fe') note.innerHTML='Entrenable: solo la capa final · <b style="color:var(--fg)">2.049 parámetros</b>';
  else if(mode==='ft') note.innerHTML='Entrenable: layer4 + fc · <b style="color:var(--fg)">~15M parámetros</b> · mejor modelo: <b style="color:var(--fg)">93,4 %</b>';
  const col=el('div');col.style.display='flex';col.style.flexDirection='column';col.style.alignItems='center';
  col.appendChild(pipe);col.appendChild(note);
  stage.appendChild(col);
  const items=pipe.querySelectorAll('.block');
  items.forEach((b,i)=>setTimeout(()=>b.classList.add('show'),120+i*110));
}

function exTile(src,title,sub){
  const box=el('div','block');box.style.padding='8px';box.style.minWidth='0';
  box.innerHTML='<div class="bs" style="margin-bottom:6px;font-weight:600;color:var(--fg)">'+title+'</div>'+
    '<img src="'+src+'" style="width:104px;height:104px;border-radius:8px;display:block;border:1px solid var(--line)">'+
    (sub?'<div class="bs" style="margin-top:6px">'+sub+'</div>':'');
  return box;
}
function renderExample(){
  stage.innerHTML='';
  if(!EXAMPLE){stage.appendChild(el('div','lbl','(faltan las activaciones del ejemplo)'));return;}
  const row=el('div','pipe');
  row.appendChild(exTile(EXAMPLE.input,'Imagen',''));
  const st=[['Bloque 1','32 filtros · 112²'],['Bloque 2','64 · 56²'],['Bloque 3','128 · 28²'],['Bloque 4','256 · 14²']];
  const maps=[EXAMPLE.b1,EXAMPLE.b2,EXAMPLE.b3,EXAMPLE.b4];
  st.forEach((s,i)=>{row.appendChild(arrow());row.appendChild(exTile(maps[i],s[0],s[1]));});
  row.appendChild(arrow());
  const v=el('div','block');v.style.minWidth='120px';
  v.innerHTML='<div class="verdict" style="color:#c76b00">IA</div><div class="bs" style="margin-top:8px">p = '+(EXAMPLE.prob).toFixed(2).replace(".",",")+' · pero es <b>real</b></div>';
  row.appendChild(v);
  const note=el('div');note.style.cssText='width:100%;text-align:center;margin-top:22px;font-size:16px;color:var(--muted);';
  note.innerHTML='Activaciones reales de la CNN. La procesa bien, pero como <b style="color:var(--fg)">nunca vio fotos así</b> en el entrenamiento, la clasifica mal.';
  const col=el('div');col.style.display='flex';col.style.flexDirection='column';col.style.alignItems='center';
  col.appendChild(row);col.appendChild(note);
  stage.appendChild(col);
  const items=row.querySelectorAll('.block');
  items.forEach((b,i)=>setTimeout(()=>b.classList.add('show'),120+i*160));
}
function renderIncremental(){
  stage.innerHTML='';
  const col=el('div');col.style.textAlign='center';
  col.innerHTML=
    '<div style="font-size:22px;color:var(--muted);margin-bottom:14px">Seguimos entrenando el FT sobre fotos de redes sociales (itw-sm)</div>'+
    '<div style="font-size:68px;font-weight:800;letter-spacing:-.03em;line-height:1">'+
      '<span style="color:var(--muted)">62,5%</span>'+
      '<span style="color:var(--muted);font-weight:400;padding:0 20px">→</span>'+
      '<span style="color:var(--blue)">94,5%</span>'+
    '</div>'+
    '<div style="font-size:18px;color:var(--muted);margin-top:14px">accuracy sobre redes sociales, antes y después de adaptar</div>'+
    '<div style="font-size:16px;color:var(--muted);margin-top:22px">Costo acotado: −7 puntos en el dominio original → <b style="color:var(--fg)">un modelo útil en ambos</b></div>';
  const btn=el('button');
  btn.innerHTML='↺ Volver al inicio';
  btn.style.cssText='display:inline-block;margin-top:36px;font-family:inherit;font-size:17px;font-weight:500;color:#fff;background:var(--blue);border:none;border-radius:980px;padding:12px 28px;cursor:pointer;';
  btn.onclick=(e)=>{e.stopPropagation();idx=0;render();};
  col.appendChild(btn);
  stage.appendChild(col);
}
function renderHero(kind){
  stage.innerHTML='';
  const h=el('div','hero');
  if(kind==='title'){h.innerHTML='<h2>De píxeles a "¿real o IA?"</h2><p>El mecanismo de una red convolucional, paso a paso.<br>Avanzá con las flechas o la barra espaciadora.</p>';}
  else{h.innerHTML='<h2>La CNN aprende a mirar</h2><p>Filtro por filtro, capa por capa, detecta los rastros que deja un generador de imágenes.</p>';}
  stage.appendChild(h);
}

// ─────────────────────────────────────────────────────────────
//  Motor de navegación
// ─────────────────────────────────────────────────────────────
function fitStage(){
  const m=document.querySelector('main');
  stage.style.transform='none';
  const cs=getComputedStyle(m);
  const availW=m.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH=m.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  const sw=stage.scrollWidth, sh=stage.scrollHeight;
  if(!sw||!sh) return;
  const scale=Math.min(availW/sw, availH/sh, 1);
  if(scale<0.999) stage.style.transform='scale('+scale+')';
}
let idx=0, prevKind=null;
function render(){
  const step=steps[idx];
  const [chip,title,body]=captionFor(step);
  document.getElementById('chip').textContent=chip;
  document.getElementById('capTitle').innerHTML=title;
  document.getElementById('capBody').innerHTML=body;
  document.getElementById('counter').textContent=(idx+1)+' / '+steps.length;
  document.getElementById('progress').style.width=((idx)/(steps.length-1)*100)+'%';
  document.getElementById('prev').disabled=(idx===0);
  document.getElementById('next').disabled=(idx===steps.length-1);

  if(step.kind==='conv'){
    if(prevKind!=='conv'||!conv.built) buildConv();
    updateConv(step.k);
  }else{
    conv.built=false;
    switch(step.kind){
      case 'title': renderHero('title');break;
      case 'mlp': renderMlp();break;
      case 'pixels': renderPixels();break;
      case 'kernel': renderKernel();break;
      case 'convdone': renderConvDone();break;
      case 'filters': renderFilters();break;
      case 'pool': renderPool();break;
      case 'hierarchy': renderHierarchy();break;
      case 'pipeline': renderPipeline();break;
      case 'resnet': renderResnet();break;
      case 'fe': renderFe();break;
      case 'ft': renderFt();break;
      case 'example': renderExample();break;
      case 'incremental': renderIncremental();break;
    }
  }
  prevKind=step.kind;
  if(history.replaceState) history.replaceState(null,'','#'+idx);
  fitStage();
}
function go(d){const n=idx+d;if(n>=0&&n<steps.length){idx=n;render();}}

document.getElementById('next').onclick=()=>go(1);
document.getElementById('prev').onclick=()=>go(-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key==='Home'){idx=0;render();}
  else if(e.key==='End'){idx=steps.length-1;render();}
});
document.querySelector('main').addEventListener('click',()=>go(1));
window.addEventListener('resize',fitStage);
window.addEventListener('orientationchange',()=>setTimeout(fitStage,200));

// arranque (permite #n para saltar a un paso)
const h=parseInt(location.hash.replace('#',''));
if(!isNaN(h)&&h>=0&&h<steps.length) idx=h;
render();
</script>
