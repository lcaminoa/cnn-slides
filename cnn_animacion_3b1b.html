<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cómo funciona una CNN — estilo 3Blue1Brown</title>
<style>
  :root{
    --bg:#0b0e14; --fg:#e8eaed; --muted:#8b929e; --line:#2b313c;
    --surface:#151a22; --blue:#3fa7ff; --blue-soft:#7fc4ff; --yellow:#ffd35c;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    --serif:"Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
    --cell:56px; --gap:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #131a26 0%, var(--bg) 60%);
    color:var(--fg);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;flex-direction:column;overflow:hidden;user-select:none;
  }

  /* ── Barra de texto superior ── */
  header{padding:34px 8vw 10px;text-align:center;flex:none;}
  .chip{
    display:inline-block;font-size:13px;font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;color:var(--blue-soft);border:1px solid rgba(63,167,255,.35);
    border-radius:980px;padding:5px 16px;margin-bottom:16px;background:rgba(63,167,255,.07);
  }
  h1.caption{font-family:var(--serif);font-size:36px;font-weight:600;letter-spacing:-.01em;
             line-height:1.1;text-shadow:0 2px 30px rgba(63,167,255,.18);}
  p.explain{
    margin:14px auto 0;max-width:900px;font-size:20px;line-height:1.45;
    color:var(--muted);font-weight:400;
  }
  p.explain b{color:var(--fg);font-weight:600;}

  /* ── Escenario ── */
  main{flex:1;display:flex;align-items:center;justify-content:center;
       padding:10px 6vw 0;min-height:0;overflow:hidden;}
  .stage{display:flex;align-items:center;justify-content:center;gap:56px;flex-wrap:wrap;}

  .gridwrap{position:relative;}
  .grid{display:grid;gap:var(--gap);}
  .lbl{font-size:15px;color:var(--muted);text-align:center;margin-bottom:12px;
       font-weight:600;letter-spacing:.02em;}
  .cell{
    width:var(--cell);height:var(--cell);border-radius:9px;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:19px;font-weight:600;font-variant-numeric:tabular-nums;
    background:var(--surface);color:var(--fg);
    transition:transform .35s ease, opacity .35s ease, background .35s ease, box-shadow .35s ease;
  }
  .cell.dim{opacity:.28;}
  .cell.win{border-color:var(--yellow);box-shadow:0 0 0 2px var(--yellow) inset, 0 0 16px rgba(255,211,92,.25);}
  .cell.hidden{opacity:0;transform:scale(.6);}
  .cell.pop{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.14);}100%{transform:scale(1);opacity:1;}}

  .koverlay{
    position:absolute;top:0;left:0;pointer-events:none;
    border:3px solid var(--yellow);border-radius:12px;
    box-shadow:0 0 26px rgba(255,211,92,.5), inset 0 0 12px rgba(255,211,92,.15);
    transition:transform .5s cubic-bezier(.4,0,.2,1);
  }

  .arrow{font-size:40px;color:var(--muted);font-weight:300;}
  .opsign{font-size:34px;color:var(--yellow);font-weight:300;padding:0 4px;}

  .calc{min-width:210px;max-width:250px;background:var(--surface);border:1px solid var(--line);
        border-radius:16px;padding:20px 22px;font-size:17px;line-height:1.5;color:var(--muted);}
  .calc .big{font-size:30px;font-weight:700;color:var(--fg);letter-spacing:-.02em;
             margin-top:6px;font-variant-numeric:tabular-nums;}
  .calc .blue{color:var(--blue);}

  /* Pipeline */
  .pipe{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;}
  .block{border-radius:14px;background:var(--surface);border:1px solid var(--line);
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         padding:16px;opacity:0;transform:translateY(14px);
         transition:opacity .45s ease, transform .45s ease;}
  .block.show{opacity:1;transform:none;}
  .block .bt{font-size:16px;font-weight:700;}
  .block .bs{font-size:13px;color:var(--muted);margin-top:3px;}
  .conv-b{background:rgba(63,167,255,.12);border-color:rgba(63,167,255,.42);}
  .verdict{font-size:26px;font-weight:700;color:var(--blue-soft);}
  .probbar{width:200px;height:16px;border-radius:980px;background:var(--line);
           overflow:hidden;margin-top:10px;}
  .probfill{height:100%;width:0;background:linear-gradient(90deg,#2b7fd4,var(--blue));
            transition:width .9s ease;border-radius:980px;box-shadow:0 0 14px rgba(63,167,255,.5);}

  .hero{text-align:center;max-width:1000px;}
  .hero h2{font-family:var(--serif);font-size:54px;font-weight:600;letter-spacing:-.01em;
           line-height:1.06;text-shadow:0 2px 40px rgba(63,167,255,.22);}
  .hero p{margin-top:22px;font-size:22px;color:var(--muted);line-height:1.5;}

  .maps{display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .mapcol{opacity:0;transform:translateY(12px);transition:opacity .45s,transform .45s;}
  .mapcol.show{opacity:1;transform:none;}

  .tiers{display:flex;align-items:center;gap:26px;flex-wrap:wrap;justify-content:center;}
  .tier{width:150px;height:150px;border-radius:16px;background:var(--surface);
        border:1px solid var(--line);display:flex;flex-direction:column;
        align-items:center;justify-content:flex-start;padding:12px 10px 10px;
        overflow:hidden;opacity:0;transform:translateY(12px);
        box-shadow:0 0 30px rgba(63,167,255,.06);
        transition:opacity .45s,transform .45s;}
  .tier.show{opacity:1;transform:none;}
  .tier .tname{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .tier svg{width:100%;flex:1;min-height:0;}

  /* ── Controles ── */
  footer{flex:none;display:flex;align-items:center;justify-content:center;gap:22px;
         padding:16px 0 26px;}
  .nav{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);
       background:var(--surface);color:var(--fg);font-size:22px;cursor:pointer;
       display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;}
  .nav:hover{background:#1c2330;border-color:var(--blue);}
  .nav:disabled{opacity:.3;cursor:default;}
  .counter{font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:52px;text-align:center;}
  .hint{position:fixed;bottom:8px;right:14px;font-size:12px;color:var(--muted);opacity:.6;}
  .hint b{color:var(--blue-soft);}
  .progress{position:fixed;top:0;left:0;height:3px;background:var(--blue);
            box-shadow:0 0 12px rgba(63,167,255,.7);transition:width .3s ease;z-index:10;}
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <header>
    <div class="chip" id="chip">Redes convolucionales</div>
    <h1 class="caption" id="capTitle"></h1>
    <p class="explain" id="capBody"></p>
  </header>
  <main><div class="stage" id="stage"></div></main>
  <footer>
    <button class="nav" id="prev" aria-label="Anterior">&#8592;</button>
    <div class="counter" id="counter"></div>
    <button class="nav" id="next" aria-label="Siguiente">&#8594;</button>
  </footer>
  <div class="hint">← → o barra espaciadora · <b>F</b> pantalla completa</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Datos: una "imagen" 5×5 con un borde vertical + filtro detector
// ─────────────────────────────────────────────────────────────
const INPUT = [
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
  [1,2,5,8,9],
];
const KERNEL = [[-1,0,1],[-1,0,1],[-1,0,1]];
const N = 5, K = 3, OUT = N - K + 1;

function convVal(r,c){
  let s=0;
  for(let i=0;i<K;i++) for(let j=0;j<K;j++) s += KERNEL[i][j]*INPUT[r+i][c+j];
  return s;
}
const OUTVALS=[]; let OUTMAX=0;
for(let r=0;r<OUT;r++){OUTVALS[r]=[];for(let c=0;c<OUT;c++){const v=convVal(r,c);OUTVALS[r][c]=v;OUTMAX=Math.max(OUTMAX,Math.abs(v));}}

const steps=[];
steps.push({kind:'title'});
steps.push({kind:'pixels'});
steps.push({kind:'mlp'});
steps.push({kind:'kernel'});
for(let k=0;k<OUT*OUT;k++) steps.push({kind:'conv',k});
steps.push({kind:'convdone'});
steps.push({kind:'filters'});
steps.push({kind:'relu'});
steps.push({kind:'pool'});
steps.push({kind:'hierarchy'});
steps.push({kind:'pipeline'});
steps.push({kind:'properties'});
steps.push({kind:'resnet'});
steps.push({kind:'fe'});
steps.push({kind:'ft'});
steps.push({kind:'closing'});

function captionFor(step){
  switch(step.kind){
    case 'title': return ['Redes convolucionales','¿Cómo entiende una CNN una imagen?','Paso a paso, el mecanismo que usa nuestro mejor modelo para decidir si una foto es <b>real</b> o <b>generada por IA</b>.'];
    case 'pixels': return ['1 · La imagen','Para la red, una imagen es una grilla de números','Cada píxel es un valor de intensidad. En este ejemplo 5×5, <b>oscuro a la izquierda, claro a la derecha</b>: hay un borde vertical en el medio.'];
    case 'mlp': return ['2 · El punto de partida','Un MLP aplana la imagen y pierde la estructura espacial','El MLP estira la imagen en un vector y trata cada píxel por separado: <b>los vecinos dejan de ser vecinos</b>. Es nuestro baseline (MLP + PCA); su límite motiva la CNN.'];
    case 'kernel': return ['3 · El filtro','Un filtro es una ventana de pesos que busca un patrón','Este filtro 3×3 es un <b>detector de bordes verticales</b>: resta la izquierda de la derecha. Se desliza por toda la imagen.'];
    case 'conv':{
      const r=Math.floor(step.k/OUT), c=step.k%OUT;
      if(step.k===0) return ['4 · La convolución','El filtro se apoya sobre una región y calcula un número','Multiplica cada peso por el píxel de abajo y <b>suma todo</b>. El resultado va a la primera celda del mapa.'];
      if(step.k===OUT*OUT-1) return ['4 · La convolución','…y así hasta cubrir toda la imagen','Barrió todas las posiciones con <b>los mismos pesos</b> (pesos compartidos) y armó el mapa completo.'];
      return ['4 · La convolución','Se desliza a la siguiente posición y repite','Cada posición da una celda del <b>mapa de activación</b> (fila '+(r+1)+', col '+(c+1)+').'];
    }
    case 'convdone': return ['5 · El mapa de activación','El resultado dice DÓNDE aparece el patrón','La columna central es la más intensa: ahí está el borde. Valores altos = <b>acá hay un borde vertical</b>.'];
    case 'filters': return ['6 · Muchos filtros a la vez','Cada filtro detecta algo distinto','Una capa tiene decenas de filtros: bordes, texturas, colores. Cada uno da su propio mapa, y <b>la red aprende sola cuáles le convienen</b>.'];
    case 'relu': return ['7 · No-linealidad (ReLU)','Se descartan los valores negativos','<b>ReLU</b> pone en 0 los negativos y deja pasar los positivos. Sin esta no-linealidad, la red solo aprendería patrones lineales.'];
    case 'pool': return ['8 · Max pooling','Se reduce el tamaño quedándose con lo más fuerte','Cada ventana 2×2 se resume en <b>su máximo</b>: el mapa se achica a la mitad. Menos cómputo y foco en lo más marcado.'];
    case 'hierarchy': return ['9 · Apilar capas','De bordes simples a estructuras complejas','Apilando bloques, la red arma una <b>jerarquía</b>: las primeras capas ven bordes y texturas; las profundas, formas y objetos.'];
    case 'pipeline': return ['10 · El pipeline completo','Así fluye una imagen por nuestra CNN','Cuatro bloques conv (32→64→128→256 filtros) achican el espacio y suman profundidad. Al final, una capa densa da la probabilidad: <b>real o IA</b>.'];
    case 'properties': return ['11 · Por qué gana sobre un MLP','Dos propiedades clave','<b>Pesos compartidos:</b> el mismo filtro recorre toda la imagen → menos parámetros y detecta el patrón esté donde esté. <b>Localidad:</b> cada activación mira solo una vecindad → aprovecha la estructura espacial que el MLP ignora.'];
    case 'resnet': return ['12 · ResNet50','Una CNN muy profunda, ya entrenada','Partimos de <b>ResNet50</b>: 50 capas preentrenadas en ImageNet (1,2M imágenes), que ya sabe ver bordes, texturas y formas. Sus <b>conexiones residuales</b> (x + F(x)) permiten tanta profundidad sin que el gradiente se desvanezca.'];
    case 'fe': return ['13 · Feature Extraction','Congelamos todo y entrenamos solo la salida','Congelamos <b>toda</b> ResNet50 y entrenamos solo la capa final: <b>2.049 parámetros</b>. Rápido, y ya da 88 %.'];
    case 'ft': return ['14 · Fine-Tuning','Descongelamos el último bloque para especializarlo','Descongelamos también <b>layer4</b> (~15M parámetros) con un learning rate chico, para adaptar los features de alto nivel a los artefactos de la IA. <b>Nuestro mejor modelo: 93,4 %.</b>'];
    case 'closing': return ['Cierre','De píxeles a "real vs. IA"','Capa por capa, la CNN aprende los <b>artefactos sutiles</b> que delatan a un generador. Por eso el fine-tuning de ResNet50 llega al 93,4 %.'];
  }
}

const stage=document.getElementById('stage');
const CELL=56, GAP=6, STRIDE=CELL+GAP;

function grayBg(v){const t=v/9;const g=Math.round(28+t*205);return `rgb(${g},${g},${g})`;}
function grayFg(v){return (v/9)>0.5?'#0b0e14':'#e8eaed';}
function blueBg(v){const a=Math.abs(v)/OUTMAX*0.92;return `rgba(63,167,255,${a})`;}
function blueFg(v){return (Math.abs(v)/OUTMAX)>0.45?'#04101c':'#cfe4ff';}

function makeGrid(vals,{cls='',color='gray'}={}){
  const wrap=document.createElement('div');wrap.className='gridwrap';
  const g=document.createElement('div');g.className='grid '+cls;
  const cols=vals[0].length;
  g.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  vals.forEach((row,r)=>row.forEach((v,c)=>{
    const cell=document.createElement('div');cell.className='cell';
    cell.dataset.r=r;cell.dataset.c=c;cell.textContent=v;
    if(color==='gray'){cell.style.background=grayBg(v);cell.style.color=grayFg(v);}
    else if(color==='kernel'){
      if(v>0){cell.style.background='rgba(63,167,255,.16)';cell.style.borderColor='rgba(63,167,255,.5)';cell.style.color='var(--blue-soft)';}
      else if(v<0){cell.style.background='rgba(255,180,80,.14)';cell.style.borderColor='rgba(255,180,80,.5)';cell.style.color='#ffca7a';}
      cell.textContent=(v>0?'+':'')+v;
    }
    g.appendChild(cell);
  }));
  wrap.appendChild(g);
  return wrap;
}
function labeled(node,text){
  const box=document.createElement('div');
  const l=document.createElement('div');l.className='lbl';l.innerHTML=text;
  box.appendChild(l);box.appendChild(node);return box;
}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function arrow(){return el('div','arrow','→');}

let conv={built:false};
function buildConv(){
  stage.innerHTML='';
  const inWrap=makeGrid(INPUT,{color:'gray'});
  const overlay=el('div','koverlay');
  overlay.style.width=(K*CELL+(K-1)*GAP)+'px';
  overlay.style.height=(K*CELL+(K-1)*GAP)+'px';
  inWrap.appendChild(overlay);

  const empty=OUTVALS.map(row=>row.map(_=>''));
  const outWrap=makeGrid(empty,{color:'blue'});
  outWrap.querySelectorAll('.cell').forEach(c=>{c.classList.add('hidden');c.style.background='var(--surface)';});

  const calc=el('div','calc');

  stage.appendChild(labeled(inWrap,'Imagen (5×5)'));
  const mid=el('div');mid.style.display='flex';mid.style.flexDirection='column';mid.style.alignItems='center';mid.style.gap='10px';
  mid.appendChild(labeled(makeGrid(KERNEL,{color:'kernel'}),'Filtro'));
  stage.appendChild(mid);
  stage.appendChild(arrow());
  stage.appendChild(labeled(outWrap,'Mapa de activación (3×3)'));
  stage.appendChild(calc);

  conv={built:true,inputCells:inWrap.querySelectorAll('.cell'),outCells:outWrap.querySelectorAll('.cell'),overlay,calc};
}
function updateConv(k){
  const r=Math.floor(k/OUT), c=k%OUT;
  conv.overlay.style.opacity='1';
  conv.overlay.style.transform=`translate(${c*STRIDE}px,${r*STRIDE}px)`;
  conv.inputCells.forEach(cell=>{
    const cr=+cell.dataset.r, cc=+cell.dataset.c;
    const inWin=(cr>=r&&cr<r+K&&cc>=c&&cc<c+K);
    cell.classList.toggle('win',inWin);
    cell.classList.toggle('dim',!inWin);
  });
  conv.outCells.forEach((cell,idx)=>{
    const cr=Math.floor(idx/OUT), cc=idx%OUT, v=OUTVALS[cr][cc];
    if(idx<=k){
      if(cell.classList.contains('hidden')){cell.classList.remove('hidden');cell.classList.add('pop');}
      cell.textContent=v;cell.style.background=blueBg(v);cell.style.color=blueFg(v);
    }else{
      cell.classList.add('hidden');cell.textContent='';cell.style.background='var(--surface)';
    }
  });
  let terms=[];
  for(let i=0;i<K;i++)for(let j=0;j<K;j++){const w=KERNEL[i][j];if(w!==0)terms.push(`(${w>0?'+':''}${w})·${INPUT[r+i][c+j]}`);}
  conv.calc.innerHTML=`posición fila ${r+1}, col ${c+1}<br>Σ pesos × píxeles:<br><span style="font-size:15px">${terms.join(' ')}</span><div class="big blue">= ${OUTVALS[r][c]}</div>`;
}

function renderPixels(){
  stage.innerHTML='';
  stage.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen 5×5 · cada celda = un píxel'));
}
function renderKernel(){
  stage.innerHTML='';
  stage.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen'));
  const mid=el('div');mid.style.display='flex';mid.style.alignItems='center';mid.style.gap='16px';
  mid.appendChild(el('div','opsign','✳'));
  mid.appendChild(labeled(makeGrid(KERNEL,{color:'kernel'}),'Filtro 3×3 (detector de borde)'));
  stage.appendChild(mid);
}
function renderConvDone(){
  buildConv();updateConv(OUT*OUT-1);
  conv.overlay.style.opacity='0';
  conv.inputCells.forEach(c=>{c.classList.remove('win','dim');});
  conv.calc.innerHTML='Mapa completo.<br>Los valores altos marcan<br>el <b style="color:var(--blue-soft)">borde vertical</b>.';
}
function renderFilters(){
  stage.innerHTML='';
  const maps=el('div','maps');
  const defs=[
    {name:'Borde vertical',k:[[-1,0,1],[-1,0,1],[-1,0,1]]},
    {name:'Borde horizontal',k:[[-1,-1,-1],[0,0,0],[1,1,1]]},
    {name:'Suavizado',k:[[1,1,1],[1,1,1],[1,1,1]]},
  ];
  const inCol=el('div','mapcol show');
  inCol.appendChild(labeled(makeGrid(INPUT,{color:'gray'}),'Imagen'));
  maps.appendChild(inCol);
  maps.appendChild(el('div','arrow','→'));
  defs.forEach((d,i)=>{
    const vals=[],mx={m:0};
    for(let r=0;r<OUT;r++){vals[r]=[];for(let c=0;c<OUT;c++){let s=0;for(let a=0;a<K;a++)for(let b=0;b<K;b++)s+=d.k[a][b]*INPUT[r+a][c+b];vals[r][c]=s;mx.m=Math.max(mx.m,Math.abs(s));}}
    const g=makeGrid(vals.map(row=>row.map(v=>v)),{color:'blue'});
    g.querySelectorAll('.cell').forEach((cell,idx)=>{const v=vals[Math.floor(idx/OUT)][idx%OUT];const a=(mx.m?Math.abs(v)/mx.m:0)*0.92;cell.style.background=`rgba(63,167,255,${a})`;cell.style.color=a>0.45?'#04101c':'#cfe4ff';});
    const col=el('div','mapcol');col.appendChild(labeled(g,d.name));
    col.style.transitionDelay=(i*0.18)+'s';
    maps.appendChild(col);
  });
  stage.appendChild(maps);
  requestAnimationFrame(()=>maps.querySelectorAll('.mapcol').forEach(m=>m.classList.add('show')));
}
function renderRelu(){
  stage.innerHTML='';
  const before=[[-4,3,-1],[2,-5,6],[-2,1,-3]];
  const after=before.map(r=>r.map(v=>Math.max(0,v)));
  stage.appendChild(labeled(makeGrid(before,{color:'blue'}),'Antes de ReLU'));
  const mid=el('div');mid.style.textAlign='center';
  mid.appendChild(el('div','arrow','→'));
  mid.appendChild(el('div','lbl','max(0, x)'));
  stage.appendChild(mid);
  stage.appendChild(labeled(makeGrid(after,{color:'blue'}),'Después de ReLU'));
  stage.querySelectorAll('.cell').forEach(c=>{const v=+c.textContent;const a=Math.abs(v)/6*0.92;
    c.style.background=v<0?'rgba(255,180,80,.30)':`rgba(63,167,255,${a})`;
    c.style.color=v<0?'#ffca7a':(a>0.45?'#04101c':'#cfe4ff');});
}
function renderPool(){
  stage.innerHTML='';
  const src=[[1,3,2,4],[5,6,1,2],[7,1,3,8],[2,4,5,6]];
  const inWrap=makeGrid(src,{color:'blue'});
  inWrap.querySelectorAll('.cell').forEach(c=>{const v=+c.textContent;const a=v/8*0.9;c.style.background=`rgba(63,167,255,${a})`;c.style.color=a>0.45?'#04101c':'#cfe4ff';});
  const out=[[Math.max(1,3,5,6),Math.max(2,4,1,2)],[Math.max(7,1,2,4),Math.max(3,8,5,6)]];
  const outWrap=makeGrid(out,{color:'blue'});
  outWrap.querySelectorAll('.cell').forEach((c,idx)=>{c.classList.add('hidden');const v=out[Math.floor(idx/2)][idx%2];const a=v/8*0.9;c.style.background=`rgba(63,167,255,${a})`;c.style.color=a>0.45?'#04101c':'#cfe4ff';});
  stage.appendChild(labeled(inWrap,'Mapa 4×4'));
  const mid=el('div');mid.style.textAlign='center';mid.appendChild(el('div','arrow','→'));mid.appendChild(el('div','lbl','máximo de cada 2×2'));stage.appendChild(mid);
  stage.appendChild(labeled(outWrap,'Mapa 2×2'));
  const cells=outWrap.querySelectorAll('.cell');
  cells.forEach((c,i)=>setTimeout(()=>{c.classList.remove('hidden');c.classList.add('pop');},300+i*450));
}
function renderHierarchy(){
  stage.innerHTML='';
  const tiers=el('div','tiers');
  const svgs=[
    ['Bordes','<svg viewBox="0 0 100 100"><line x1="20" y1="10" x2="20" y2="90" stroke="%233fa7ff" stroke-width="6" stroke-linecap="round"/><line x1="50" y1="10" x2="80" y2="60" stroke="%233fa7ff" stroke-width="6" stroke-linecap="round"/></svg>'],
    ['Texturas / formas','<svg viewBox="0 0 100 100"><circle cx="35" cy="45" r="16" fill="none" stroke="%233fa7ff" stroke-width="6"/><rect x="55" y="45" width="28" height="28" rx="4" fill="none" stroke="%233fa7ff" stroke-width="6"/></svg>'],
    ['Objetos','<svg viewBox="0 0 100 100"><circle cx="50" cy="42" r="20" fill="none" stroke="%233fa7ff" stroke-width="6"/><circle cx="43" cy="40" r="3" fill="%233fa7ff"/><circle cx="57" cy="40" r="3" fill="%233fa7ff"/><path d="M40 52 Q50 60 60 52" fill="none" stroke="%233fa7ff" stroke-width="5" stroke-linecap="round"/></svg>'],
  ];
  svgs.forEach((s,i)=>{
    const t=el('div','tier');t.style.transitionDelay=(i*0.25)+'s';
    t.innerHTML='<div class="tname">'+s[0]+'</div>'+decodeURIComponent(s[1]);
    tiers.appendChild(t);
    if(i<2) tiers.appendChild(el('div','arrow','→'));
  });
  stage.appendChild(tiers);
  requestAnimationFrame(()=>tiers.querySelectorAll('.tier').forEach(t=>t.classList.add('show')));
}
function renderPipeline(){
  stage.innerHTML='';
  const pipe=el('div','pipe');
  const inb=el('div','block');inb.style.padding='0';inb.style.background='none';inb.style.border='none';
  const mini=makeGrid(INPUT,{color:'gray'});mini.querySelectorAll('.cell').forEach(c=>{c.style.width='20px';c.style.height='20px';c.style.fontSize='0';});
  mini.querySelector('.grid').style.gridTemplateColumns='repeat(5,20px)';mini.querySelector('.grid').style.gap='2px';
  inb.appendChild(labeled(mini,'Imagen<br>224×224×3'));
  pipe.appendChild(inb);
  const blocks=[
    ['Conv+Pool','32 filtros · 112²','conv-b'],
    ['Conv+Pool','64 · 56²','conv-b'],
    ['Conv+Pool','128 · 28²','conv-b'],
    ['Conv+Pool','256 · 14²','conv-b'],
    ['Flatten','50.176 valores',''],
    ['Densa','512 → 1',''],
  ];
  blocks.forEach(b=>{pipe.appendChild(el('div','arrow','→'));const d=el('div','block '+b[2]);d.innerHTML='<div class="bt">'+b[0]+'</div><div class="bs">'+b[1]+'</div>';d.style.minWidth='108px';d.style.minHeight='72px';pipe.appendChild(d);});
  pipe.appendChild(el('div','arrow','→'));
  const verd=el('div','block');verd.style.minWidth='150px';
  verd.innerHTML='<div class="verdict">σ → IA</div><div class="probbar"><div class="probfill" id="pf"></div></div><div class="bs" style="margin-top:8px">p = 0,93</div>';
  pipe.appendChild(verd);
  stage.appendChild(pipe);
  const items=pipe.querySelectorAll('.block');
  items.forEach((b,i)=>setTimeout(()=>{b.classList.add('show');if(i===items.length-1){const pf=document.getElementById('pf');if(pf)pf.style.width='93%';}},200+i*260));
}
function renderProperties(){
  stage.innerHTML='';
  const wrap=el('div');wrap.style.display='flex';wrap.style.gap='40px';wrap.style.flexWrap='wrap';wrap.style.justifyContent='center';
  const cards=[
    ['Pesos compartidos','El mismo filtro recorre toda la imagen. Menos parámetros y detecta el patrón <b>sin importar dónde</b> esté.'],
    ['Localidad','Cada activación mira solo una <b>vecindad</b> de píxeles: aprovecha la estructura espacial que el MLP pierde al aplanar.'],
  ];
  cards.forEach(c=>{const d=el('div');d.style.cssText='background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:34px 38px;max-width:380px;box-shadow:0 0 40px rgba(63,167,255,.07);';d.innerHTML='<div style="font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:12px;color:var(--blue-soft)">'+c[0]+'</div><div style="font-size:19px;line-height:1.5;color:var(--muted)">'+c[1]+'</div>';wrap.appendChild(d);});
  stage.appendChild(wrap);
}
function renderMlp(){
  stage.innerHTML='';
  const hi=[1*5+2, 2*5+2];
  const gridWrap=makeGrid(INPUT,{color:'gray'});
  const gc=gridWrap.querySelectorAll('.cell');
  hi.forEach(i=>{gc[i].style.borderColor='var(--yellow)';gc[i].style.boxShadow='0 0 0 2px var(--yellow) inset, 0 0 14px rgba(255,211,92,.3)';});
  stage.appendChild(labeled(gridWrap,'Imagen 5×5'));
  const mid=el('div');mid.style.textAlign='center';
  mid.appendChild(el('div','arrow','→'));
  mid.appendChild(el('div','lbl','aplanar'));
  stage.appendChild(mid);
  const strip=makeGrid([INPUT.flat()],{color:'gray'});
  strip.querySelector('.grid').style.gridTemplateColumns='repeat(25,26px)';
  strip.querySelector('.grid').style.gap='3px';
  strip.querySelectorAll('.cell').forEach(c=>{c.style.width='26px';c.style.height='26px';c.style.fontSize='11px';c.style.borderRadius='5px';});
  const sc=strip.querySelectorAll('.cell');
  hi.forEach(i=>{sc[i].style.borderColor='var(--yellow)';sc[i].style.boxShadow='0 0 0 2px var(--yellow) inset, 0 0 14px rgba(255,211,92,.3)';});
  stage.appendChild(labeled(strip,'Vector de 25 valores → capas densas → 1 salida<br><span style="color:var(--yellow)">los vecinos verticales quedan a 5 lugares de distancia</span>'));
}
function resStack(mode){
  stage.innerHTML='';
  const pipe=el('div','pipe');
  const inb=el('div','block');inb.style.padding='0';inb.style.background='none';inb.style.border='none';
  const mini=makeGrid(INPUT,{color:'gray'});
  mini.querySelector('.grid').style.gridTemplateColumns='repeat(5,16px)';mini.querySelector('.grid').style.gap='2px';
  mini.querySelectorAll('.cell').forEach(c=>{c.style.width='16px';c.style.height='16px';c.style.fontSize='0';});
  inb.appendChild(labeled(mini,'Imagen'));
  pipe.appendChild(inb);
  const stages=['conv1','layer1','layer2','layer3','layer4'];
  stages.forEach((name,i)=>{
    pipe.appendChild(arrow());
    const last=(i===stages.length-1);
    let bg,bd,fg,tag,glow='';
    if(mode==='fe'){bg='rgba(255,255,255,.04)';bd='var(--line)';fg='var(--muted)';tag='🔒 congelada';}
    else if(mode==='ft'){ if(last){bg='rgba(63,167,255,.16)';bd='var(--blue)';fg='var(--fg)';tag='entrenable';glow='0 0 20px rgba(63,167,255,.4)';} else {bg='rgba(255,255,255,.04)';bd='var(--line)';fg='var(--muted)';tag='🔒 congelada';} }
    else {bg='rgba(63,167,255,.10)';bd='rgba(63,167,255,.4)';fg='var(--fg)';tag='preentrenada';}
    const b=el('div','block');b.style.minWidth='92px';b.style.minHeight='68px';
    b.style.background=bg;b.style.borderColor=bd;if(glow)b.style.boxShadow=glow;
    b.innerHTML='<div class="bt" style="color:'+fg+'">'+name+'</div><div class="bs">'+tag+'</div>';
    pipe.appendChild(b);
  });
  pipe.appendChild(arrow());
  const fc=el('div','block');fc.style.minWidth='96px';fc.style.minHeight='68px';
  if(mode==='fe'||mode==='ft'){fc.style.background='rgba(63,167,255,.16)';fc.style.borderColor='var(--blue)';fc.style.boxShadow='0 0 20px rgba(63,167,255,.4)';fc.innerHTML='<div class="bt">fc → 1</div><div class="bs">entrenable</div>';}
  else{fc.style.background='rgba(63,167,255,.10)';fc.style.borderColor='rgba(63,167,255,.4)';fc.innerHTML='<div class="bt">fc → 1</div><div class="bs">salida</div>';}
  pipe.appendChild(fc);
  const note=el('div');note.style.cssText='width:100%;text-align:center;margin-top:26px;font-size:16px;color:var(--muted);';
  if(mode==='resnet') note.innerHTML='50 capas · preentrenada en ImageNet · cada bloque: salida = <b style="color:var(--fg)">x + F(x)</b> (conexión residual)';
  else if(mode==='fe') note.innerHTML='Entrenable: solo la capa final · <b style="color:var(--fg)">2.049 parámetros</b>';
  else if(mode==='ft') note.innerHTML='Entrenable: layer4 + fc · <b style="color:var(--fg)">~15M parámetros</b> · mejor modelo: <b style="color:var(--fg)">93,4 %</b>';
  const col=el('div');col.style.display='flex';col.style.flexDirection='column';col.style.alignItems='center';
  col.appendChild(pipe);col.appendChild(note);
  stage.appendChild(col);
  const items=pipe.querySelectorAll('.block');
  items.forEach((b,i)=>setTimeout(()=>b.classList.add('show'),120+i*110));
}
function renderResnet(){resStack('resnet');}
function renderFe(){resStack('fe');}
function renderFt(){resStack('ft');}
function renderHero(kind){
  stage.innerHTML='';
  const h=el('div','hero');
  if(kind==='title'){h.innerHTML='<h2>De píxeles a "¿real o IA?"</h2><p>El mecanismo de una red convolucional, paso a paso.<br>Avanzá con las flechas o la barra espaciadora.</p>';}
  else{h.innerHTML='<h2>La CNN aprende a mirar</h2><p>Filtro por filtro, capa por capa, detecta los rastros que deja un generador de imágenes.</p>';}
  stage.appendChild(h);
}

let idx=0, prevKind=null;
function render(){
  const step=steps[idx];
  const [chip,title,body]=captionFor(step);
  document.getElementById('chip').textContent=chip;
  document.getElementById('capTitle').innerHTML=title;
  document.getElementById('capBody').innerHTML=body;
  document.getElementById('counter').textContent=(idx+1)+' / '+steps.length;
  document.getElementById('progress').style.width=((idx)/(steps.length-1)*100)+'%';
  document.getElementById('prev').disabled=(idx===0);
  document.getElementById('next').disabled=(idx===steps.length-1);

  if(step.kind==='conv'){
    if(prevKind!=='conv'||!conv.built) buildConv();
    updateConv(step.k);
  }else{
    conv.built=false;
    switch(step.kind){
      case 'title': renderHero('title');break;
      case 'mlp': renderMlp();break;
      case 'pixels': renderPixels();break;
      case 'kernel': renderKernel();break;
      case 'convdone': renderConvDone();break;
      case 'filters': renderFilters();break;
      case 'relu': renderRelu();break;
      case 'pool': renderPool();break;
      case 'hierarchy': renderHierarchy();break;
      case 'pipeline': renderPipeline();break;
      case 'properties': renderProperties();break;
      case 'resnet': renderResnet();break;
      case 'fe': renderFe();break;
      case 'ft': renderFt();break;
      case 'closing': renderHero('closing');break;
    }
  }
  prevKind=step.kind;
  if(history.replaceState) history.replaceState(null,'','#'+idx);
}
function go(d){const n=idx+d;if(n>=0&&n<steps.length){idx=n;render();}}

document.getElementById('next').onclick=()=>go(1);
document.getElementById('prev').onclick=()=>go(-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key==='Home'){idx=0;render();}
  else if(e.key==='End'){idx=steps.length-1;render();}
});
document.querySelector('main').addEventListener('click',()=>go(1));

const h=parseInt(location.hash.replace('#',''));
if(!isNaN(h)&&h>=0&&h<steps.length) idx=h;
render();
</script>
</body>
